name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Compute Vite base path
        run: |
          if [[ "${GITHUB_REPOSITORY}" == *.github.io ]]; then
            echo "VITE_BASE_PATH=/" >> "$GITHUB_ENV"
          else
            echo "VITE_BASE_PATH=/${GITHUB_REPOSITORY#*/}/" >> "$GITHUB_ENV"
          fi

      - name: Resolve backend build variables
        shell: bash
        run: |
          sanitize() {
            local value="$1"
            value="${value#"${value%%[![:space:]]*}"}"
            value="${value%"${value##*[![:space:]]}"}"
            if [[ "$value" =~ ^\".*\"$ || "$value" =~ ^\'.*\'$ ]]; then
              value="${value:1:${#value}-2}"
            fi
            echo "$value"
          }

          SUPABASE_URL_RAW="${{ vars.VITE_SUPABASE_URL != '' && vars.VITE_SUPABASE_URL || secrets.VITE_SUPABASE_URL || vars.SUPABASE_URL || secrets.SUPABASE_URL }}"
          SUPABASE_KEY_RAW="${{ vars.VITE_SUPABASE_PUBLISHABLE_KEY != '' && vars.VITE_SUPABASE_PUBLISHABLE_KEY || secrets.VITE_SUPABASE_PUBLISHABLE_KEY || vars.VITE_SUPABASE_ANON_KEY || secrets.VITE_SUPABASE_ANON_KEY || vars.SUPABASE_ANON_KEY || secrets.SUPABASE_ANON_KEY }}"
          SUPABASE_PROJECT_ID_RAW="${{ vars.VITE_SUPABASE_PROJECT_ID != '' && vars.VITE_SUPABASE_PROJECT_ID || secrets.VITE_SUPABASE_PROJECT_ID || vars.SUPABASE_PROJECT_ID || secrets.SUPABASE_PROJECT_ID }}"

          SUPABASE_URL="$(sanitize "$SUPABASE_URL_RAW")"
          SUPABASE_KEY="$(sanitize "$SUPABASE_KEY_RAW")"
          SUPABASE_PROJECT_ID="$(sanitize "$SUPABASE_PROJECT_ID_RAW")"

          if [[ -z "$SUPABASE_URL" || -z "$SUPABASE_KEY" || -z "$SUPABASE_PROJECT_ID" ]]; then
            echo "Missing required variables: set VITE_SUPABASE_URL, VITE_SUPABASE_PUBLISHABLE_KEY (or VITE_SUPABASE_ANON_KEY), and VITE_SUPABASE_PROJECT_ID in GitHub Actions variables/secrets."
            exit 1
          fi

          echo "VITE_SUPABASE_URL=$SUPABASE_URL" >> "$GITHUB_ENV"
          echo "VITE_SUPABASE_PUBLISHABLE_KEY=$SUPABASE_KEY" >> "$GITHUB_ENV"
          echo "VITE_SUPABASE_PROJECT_ID=$SUPABASE_PROJECT_ID" >> "$GITHUB_ENV"

      - name: Build
        run: npm run build

      - name: SPA fallback for BrowserRouter
        run: cp dist/index.html dist/404.html

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
